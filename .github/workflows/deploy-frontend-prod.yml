name: Deploy Frontend (prod)

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend-prod.yml"
  workflow_dispatch:

# OIDC: required to request the token used to assume the AWS role.
permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-frontend-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: "Flexigom / prod"
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_STRAPI_URL: ${{ vars.VITE_STRAPI_URL }}
          VITE_NODE_ENV: ${{ vars.VITE_NODE_ENV }}
          VITE_MERCADOPAGO_WEBHOOK_URL: ${{ vars.VITE_MERCADOPAGO_WEBHOOK_URL }}
          VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
        run: pnpm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync static assets to S3 (long cache)
        run: |
          aws s3 sync dist "s3://${{ vars.S3_BUCKET }}" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "*.html"

      - name: Sync HTML to S3 (no cache)
        run: |
          aws s3 sync dist "s3://${{ vars.S3_BUCKET }}" \
            --cache-control "public,max-age=0,must-revalidate" \
            --exclude "*" \
            --include "*.html"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
